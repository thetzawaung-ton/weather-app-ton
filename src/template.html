<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <div class="container">
        <div class="temp-unit">
                <input type="radio" id="fahrenheit" name="temperature" value="fahrenheit" checked>
                <label for="fahrenheit">&deg;F</label>
                <input type="radio" id="celsius" name="temperature" value="celsius">
                <label for="celsius">&deg;C</label>
        </div>
        <form>
            <input type="search" id="location" placeholder="Search location..." value="Mandalay">
            <button>Get Weather</button>
            <div class="loading"></div>
            <div class="error"></div>
        </form>
        <div class="weather-info">
            <h1 class="city"></h1>
            <h2 class="weather-description"></h2>
            <div class="temps">
                <div>
                    <h4 class="min-temp-text"></h4>
                    <p class="min-temp"></p>
                </div>
                <div>
                    <h4 class="current-temp-text"></h4>
                    <p class="current-temp"></p>
                </div>
                <div>
                    <h4 class="max-temp-text"></h4>
                    <p class="max-temp"></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
